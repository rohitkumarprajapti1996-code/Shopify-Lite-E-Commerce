                    }
                } catch {
                    return [];
                }
                return [];
            });

            const [orders, setOrders] = useState(() => {
                const defaultOrders = [
                    {
                        id: 'ORD-5491',
                        customerName: 'ROHIT SHARMA',
                        customerPhone: '9876543210',
                        customerEmail: 'rohit.buyer@gmail.com',
                        items: [
                            { id: 'men-1', title: 'Premium Tailored Slim Fit Suit', price: 11999.00, quantity: 1 }
                        ],
                        subtotal: 10168.64,
                        gstAmount: 1830.36,
                        total: 11999.00,
                        date: '2026-06-11',
                        status: 'Shipped',
                        shippingAddress: 'Flat 102, Green Valley Apartments, Gurgaon, Haryana, PIN: 122001',
                        paymentMethod: 'UPI (QR Code)',
                        transactionId: 'TXN8274921048'
                    }
                ];
                try {
                    const local = localStorage.getItem('shopify_lite_orders');
                    if (local) {
                        const parsed = JSON.parse(local);
                        if (Array.isArray(parsed) && parsed.length > 0) return parsed;
                    }
                } catch {
                    return defaultOrders;
                }
                return defaultOrders;
            });

            // Syncing states to localStorage inside React Effects
            useEffect(() => {
                localStorage.setItem('shopify_lite_auth', isAuthenticated);
                localStorage.setItem('shopify_lite_user', currentUser ? JSON.stringify(currentUser) : '');
            }, [isAuthenticated, currentUser]);

            // High Safety: Writes updates only if state is validated
            useEffect(() => {
                try {
                    if (products && products.length > 0) {
                        localStorage.setItem('shopify_lite_products', JSON.stringify(products));
                    }
                } catch (err) {
                    console.warn("Could not save to localStorage: ", err);
                }
            }, [products]);

            useEffect(() => {
                localStorage.setItem('shopify_lite_cart', JSON.stringify(cart));
            }, [cart]);

            useEffect(() => {
                localStorage.setItem('shopify_lite_orders', JSON.stringify(orders));
            }, [orders]);

            useEffect(() => {
                localStorage.setItem('shopify_lite_payouts', JSON.stringify(payoutsList));
            }, [payoutsList]);

            useEffect(() => {
                localStorage.setItem('shopify_lite_merchant_bank', merchantBankName);
                localStorage.setItem('shopify_lite_merchant_account', merchantAccountNo);
                localStorage.setItem('shopify_lite_merchant_ifsc', merchantIfsc);
            }, [merchantBankName, merchantAccountNo, merchantIfsc]);

            useEffect(() => {
                localStorage.setItem('shopify_lite_profile_name', profileDisplayName);
            }, [profileDisplayName]);

            useEffect(() => {
                localStorage.setItem('shopify_lite_profile_address', profileAddress);
            }, [profileAddress]);

            // Sync checkout user state with auth credentials on login
            useEffect(() => {
                if (currentUser && currentUser.role === 'customer') {
                    setCheckoutFullName(profileDisplayName || currentUser.name);
                    setCheckoutPhone(currentUser.phone);
                    setCheckoutAddress(profileAddress);
                }
            }, [currentUser, profileDisplayName, profileAddress]);

            const [viewingInvoiceOrder, setViewingInvoiceOrder] = useState(null);
            const [toast, setToast] = useState(null);

            // Import/Export State Variables
            const [showImportArea, setShowImportArea] = useState(false);
            const [importRawJson, setImportRawJson] = useState('');

            // Smart AI Assistant
            const [showAiAssistant, setShowAiAssistant] = useState(false);
            const [chatMessages, setChatMessages] = useState([
                { sender: 'assistant', text: 'Namaste! Welcome to Shopify-Lite. I can help you find premium suits, running shoes, power banks, earbuds, and budget-friendly apparel. Ask me for recommendations!' }
            ]);
            const [userChatInput, setUserChatInput] = useState('');
            const [isAiTyping, setIsAiTyping] = useState(false);

            const [sellerActiveTab, setSellerActiveTab] = useState('inventory'); // inventory, add-listing, payments, fulfillment, bank-settlement

            const [newProduct, setNewProduct] = useState({
                title: '',
                description: '',
                price: '',
                salePrice: '',
                category: "Men's Clothing",
                stock: '',
                image: 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=600&q=80',
                tags: ''
            });

            useEffect(() => {
                if (toast) {
                    const timer = setTimeout(() => setToast(null), 4500);
                    return () => clearTimeout(timer);
                }
            }, [toast]);

            const triggerToast = (message, type = 'success') => {
                setToast({ message, type });
            };

            const filteredProducts = useMemo(() => {
                return products.filter(product => {
                    const matchesSearch = product.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                          product.description.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                          product.tags.some(tag => tag.toLowerCase().includes(searchTerm.toLowerCase()));
                    const matchesCategory = selectedCategory === 'All' || product.category === selectedCategory;
                    const matchesSale = !onlySales || product.salePrice !== null;
                    return matchesSearch && matchesCategory && matchesSale;
                });
            }, [products, searchTerm, selectedCategory, onlySales]);

            const handleAuthSubmit = (e) => {
                e.preventDefault();

                if (authRole === 'customer') {
                    if (!customerPhone.trim() || !customerPassword.trim()) {
                        triggerToast("Please input both your Phone Number & Password.", "error");
                        return;
                    }

                    // Look up if user already saved a custom display name in localStorage
                    const savedName = localStorage.getItem('shopify_lite_profile_name') || `CUSTOMER-${customerPhone.slice(-4)}`;
                    setProfileDisplayName(savedName);

                    const userEmailMock = `${customerPhone}@shopify-lite.in`;
                    const userData = {
                        name: savedName,
                        phone: customerPhone,
                        email: userEmailMock,
                        role: 'customer'
                    };

                    setIsAuthenticated(true);
                    setCurrentUser(userData);
                    setShowAuthModal(false);
                    triggerToast(`Authenticated successfully as Buyer! Welcome back.`);
                    setCurrentView('home');
                } else {
                    if (!sellerEmail.trim() || !sellerPassword.trim()) {
                        triggerToast("Please fill out Email and Password to log in.", "error");
                        return;
                    }

                    const userData = {
                        name: `MERCHANT-${sellerEmail.split('@')[0].toUpperCase()}`,
                        email: sellerEmail,
                        role: 'seller'
                    };

                    setIsAuthenticated(true);
                    setCurrentUser(userData);
                    setShowAuthModal(false);
                    triggerToast(`Merchant Logged In! Welcome, ${userData.name}.`);
                    setCurrentView('seller-dashboard');
                    setSellerActiveTab('inventory');
                }

                setCustomerPhone('');
                setCustomerPassword('');
                setSellerEmail('');
                setSellerPassword('');
            };

            const handleSaveProfile = (e) => {
                e.preventDefault();
                if (!profileDisplayName.trim()) {
                    triggerToast("Profile name cannot be blank.", "error");
                    return;
                }
                if (!profileAddress.trim()) {
                    triggerToast("Address detail cannot be blank.", "error");
                    return;
                }
                const updatedUser = { ...currentUser, name: profileDisplayName.trim() };
                setCurrentUser(updatedUser);
                triggerToast("Your account profile details have been updated successfully!");
            };

            const handleLogout = () => {
                setIsAuthenticated(false);
                setCurrentUser(null);
                setCart([]);
                setCurrentView('home');
                triggerToast("Successfully signed out of your account.");
            };

            const addToCart = (product, quantity = 1) => {
                const activePrice = product.salePrice !== null ? product.salePrice : product.price;
                const existingIndex = cart.findIndex(item => item.id === product.id);
                
                if (existingIndex > -1) {
                    const updatedCart = [...cart];
                    if (updatedCart[existingIndex].quantity + quantity > product.stock) {
                        triggerToast(`Cannot add more. Only ${product.stock} items left in stock!`, 'error');
                        return;
                    }
                    updatedCart[existingIndex].quantity += quantity;
                    setCart(updatedCart);
                } else {
                    if (quantity > product.stock) {
                        triggerToast(`Sorry, only ${product.stock} items left in stock!`, 'error');
                        return;
                    }
                    setCart([...cart, { ...product, quantity, activePrice }]);
                }
                triggerToast(`Added ${product.title} to your cart.`);
            };

            const updateCartQty = (productId, change) => {
                const updatedCart = cart.map(item => {
                    if (item.id === productId) {
                        const newQty = item.quantity + change;
                        const inventoryStock = products.find(p => p.id === productId)?.stock || 0;
                        if (newQty > inventoryStock) {
                            triggerToast(`Only ${inventoryStock} items of this product exist in our store!`, 'error');
                            return item;
                        }
                        if (newQty < 1) return null;
                        return { ...item, quantity: newQty };
                    }
                    return item;
                }).filter(Boolean);
                setCart(updatedCart);
            };

            const removeFromCart = (productId) => {
                setCart(cart.filter(item => item.id !== productId));
                triggerToast("Item removed from your shopping bag.", "error");
            };

            const copyToClipboard = (text) => {
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                triggerToast("UPI ID Copied to Clipboard!");
            };

            // Database Export / Import Utilities (Resolves GitHub Pages sandbox reload loss completely)
            const exportDatabaseJson = () => {
                try {
                    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(products, null, 2));
                    const downloadAnchor = document.createElement('a');
                    downloadAnchor.setAttribute("href", dataStr);
                    downloadAnchor.setAttribute("download", `shopify_lite_catalog_${Date.now()}.json`);
                    document.body.appendChild(downloadAnchor);
                    downloadAnchor.click();
                    downloadAnchor.remove();
                    triggerToast("Store catalog JSON backup generated successfully!");
                } catch {
                    triggerToast("Export failed.", "error");
                }
            };

            const importDatabaseJson = (e) => {
                e.preventDefault();
                if (!importRawJson.trim()) {
                    triggerToast("Please paste a valid JSON backup string.", "error");
                    return;
                }
                try {
                    const parsed = JSON.parse(importRawJson.trim());
                    if (Array.isArray(parsed) && parsed.length > 0 && parsed[0].title && parsed[0].price) {
                        setProducts(parsed);
                        triggerToast(`Success! Imported ${parsed.length} items to your catalog.`);
                        setImportRawJson('');
                        setShowImportArea(false);
                    } else {
                        triggerToast("Invalid file structure. Must be a valid JSON array of products.", "error");
                    }
                } catch {
                    triggerToast("JSON Parsing failed. Please check your pasted text format.", "error");
                }
            };

            const cartSubtotal = useMemo(() => {
                return cart.reduce((total, item) => total + (item.activePrice * item.quantity), 0);
            }, [cart]);

            const calculatedGSTAmount = useMemo(() => {
                return parseFloat((cartSubtotal * 0.18).toFixed(2));
            }, [cartSubtotal]);

            const cartGrandTotal = useMemo(() => {
                return cartSubtotal + calculatedGSTAmount;
            }, [cartSubtotal, calculatedGSTAmount]);

            // Settlement payout calculation
            const merchantTotalIncoming = useMemo(() => {
                return orders.reduce((acc, o) => acc + o.total, 0);
            }, [orders]);

            const merchantPayoutSettled = useMemo(() => {
                return payoutsList.reduce((acc, p) => acc + p.amount, 0);
            }, [payoutsList]);

            const merchantPayoutPending = useMemo(() => {
                return Math.max(0, merchantTotalIncoming - merchantPayoutSettled);
            }, [merchantTotalIncoming, merchantPayoutSettled]);

            const handleSaveBankPayoutDetails = (e) => {
                e.preventDefault();
                if (!merchantBankName.trim() || !merchantAccountNo.trim() || !merchantIfsc.trim()) {
                    triggerToast("Please fill all banking fields.", "error");
                    return;
                }
                localStorage.setItem('shopify_lite_merchant_bank', merchantBankName.trim());
                localStorage.setItem('shopify_lite_merchant_account', merchantAccountNo.trim());
                localStorage.setItem('shopify_lite_merchant_ifsc', merchantIfsc.trim());
                triggerToast("Bank payout details saved securely!");
            };

            const handleInstantBankTransfer = () => {
                if (!merchantBankName || !merchantAccountNo || !merchantIfsc) {
                    triggerToast("Please configure and save your bank account credentials first!", "error");
                    return;
                }
                if (merchantPayoutPending <= 0) {
                    triggerToast("No unsettled balance available for transfer.", "warning");
                    return;
                }

                setIsPayoutTransferring(true);

                setTimeout(() => {
                    const newPayout = {
                        id: 'SETTLE-' + Math.floor(100000 + Math.random() * 900000),
                        date: new Date().toISOString().split('T')[0],
                        bankName: merchantBankName,
                        accountNo: merchantAccountNo.slice(-4).padStart(12, '*'),
                        amount: merchantPayoutPending,
                        referenceId: 'UTR' + Math.floor(1000000000 + Math.random() * 9000000000)
                    };
                    setPayoutsList([newPayout, ...payoutsList]);
                    setIsPayoutTransferring(false);
                    triggerToast(`Successfully transferred ₹${newPayout.amount.toLocaleString('en-IN')} to bank account ending in ${newPayout.bankName}!`);
                }, 2000);
            };

            const handleProcessPayment = (e) => {
                e.preventDefault();

                if (cart.length === 0) {
                    triggerToast("Your cart is empty!", "error");
                    return;
                }

                // Mandatory fields validation
                if (!checkoutFullName.trim() || !checkoutPhone.trim() || !checkoutAddress.trim() || !checkoutPincode.trim()) {
                    triggerToast("Please fill all customer information fields.", "error");
                    return;
                }

                if (checkoutPincode.trim().length !== 6 || isNaN(checkoutPincode)) {
                    triggerToast("Please enter a valid 6-digit Pincode.", "error");
                    return;
                }

                // Live inventory check
                for (const item of cart) {
                    const currentProduct = products.find(p => p.id === item.id);
                    if (!currentProduct || currentProduct.stock < item.quantity) {
                        triggerToast(`Order failed! "${item.title}" just ran out of stock or does not have ${item.quantity} units left.`, "error");
                        return;
                    }
                }

                if (selectedPaymentMethod === 'upi' && !paymentUpiId.trim()) {
                    triggerToast("Please enter a valid UPI ID.", "error");
                    return;
                }

                if ((selectedPaymentMethod === 'credit' || selectedPaymentMethod === 'debit') && 
                    (!paymentCardNumber || !paymentCardName || !paymentCardExpiry || !paymentCardCvv)) {
                    triggerToast("Please complete your card details.", "error");
                    return;
                }

                setIsVerifyingUpi(true);

                setTimeout(() => {
                    const txNumber = 'TXN' + Math.floor(1000000000 + Math.random() * 9000000000);
                    const orderNumber = 'ORD-' + Math.floor(1000 + Math.random() * 9000);
                    
                    const paymentModeLabel = {
                        upi: 'UPI Wallet / QR Code',
                        credit: 'Credit Card (Paid)',
                        debit: 'Debit Card (Paid)',
                        netbanking: `Net Banking (${paymentNetBank})`
                    }[selectedPaymentMethod];

                    const finalAddress = `${checkoutAddress.trim()}, PIN: ${checkoutPincode.trim()}`;

                    const newOrder = {
                        id: orderNumber,
                        customerName: checkoutFullName.trim(),
                        customerPhone: checkoutPhone.trim(),
                        customerEmail: currentUser?.email || `${checkoutPhone.trim()}@shopify-lite.in`,
                        items: cart.map(item => ({ 
                            id: item.id, 
                            title: item.title, 
                            price: item.activePrice, 
                            quantity: item.quantity 
                        })),
                        subtotal: cartSubtotal,
                        gstAmount: calculatedGSTAmount,
                        total: cartGrandTotal,
                        date: new Date().toISOString().split('T')[0],
                        status: 'Ordered',
                        shippingAddress: finalAddress,
                        paymentMethod: paymentModeLabel,
                        transactionId: txNumber
                    };

                    const updatedProducts = products.map(prod => {
                        const cartItem = cart.find(c => c.id === prod.id);
                        if (cartItem) {
                            return { ...prod, stock: Math.max(0, prod.stock - cartItem.quantity) };
                        }
                        return prod;
                    });

                    setProducts(updatedProducts);
                    setOrders([newOrder, ...orders]);
                    setCart([]);
                    setIsVerifyingUpi(false);
                    setShowPaymentGate(false);
                    
                    setPaymentCardNumber('');
                    setPaymentCardName('');
                    setPaymentCardExpiry('');
                    setPaymentCardCvv('');

                    // Update local default delivery addresses as a courtesy helper
                    setProfileAddress(checkoutAddress.trim());

                    setCurrentView('customer-dashboard');
                    triggerToast(`Payment Received via ${paymentModeLabel}! Your order has been placed.`);
                }, 2500); // 2.5s network verification simulation
            };

            const handleUpdateOrderStatus = (orderId, newStatus) => {
                setOrders(orders.map(order => {
                    if (order.id === orderId) {
                        return { ...order, status: newStatus };
                    }
                    return order;
                }));
                triggerToast(`Order status updated to: ${newStatus}`);
            };

            const deleteProductBySeller = (id) => {
                const filtered = products.filter(p => p.id !== id);
                setProducts(filtered);
                triggerToast("Listing deleted from inventory.", "error");
            };

            const handleAddProductSubmit = (e) => {
                e.preventDefault();
                if (!newProduct.title || !newProduct.price || !newProduct.stock) {
                    triggerToast("Please fill in Title, Price, and Stock level.", "error");
                    return;
                }

                const createdProduct = {
                    id: `custom-${Date.now()}`,
                    title: newProduct.title,
                    description: newProduct.description || 'No detailed specifications added.',
                    price: parseFloat(newProduct.price),
                    salePrice: newProduct.salePrice ? parseFloat(newProduct.salePrice) : null,
                    category: newProduct.category,
                    rating: 5.0,
                    reviewsCount: 0,
                    stock: parseInt(newProduct.stock),
                    image: newProduct.image || 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=600&q=80',
                    tags: newProduct.tags ? newProduct.tags.split(',').map(t => t.trim()) : ['New Listing']
                };

                setProducts([createdProduct, ...products]);
                triggerToast(`Successfully added: ${createdProduct.title}`);
                
                setNewProduct({
                    title: '',
                    description: '',
                    price: '',
                    salePrice: '',
                    category: "Men's Clothing",
                    stock: '',
                    image: 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=600&q=80',
                    tags: ''
                });
                setSellerActiveTab('inventory');
            };

            const handleAiSendMessage = (e) => {
                e.preventDefault();
                if (!userChatInput.trim()) return;

                const userMsg = userChatInput;
                setChatMessages(prev => [...prev, { sender: 'user', text: userMsg }]);
                setUserChatInput('');
                setIsAiTyping(true);

                setTimeout(() => {
                    const promptLower = userMsg.toLowerCase();
                    let reply = "I can help you browse through our store catalog! ";
                    
                    if (promptLower.includes('sale') || promptLower.includes('discount') || promptLower.includes('cheap') || promptLower.includes('deal')) {
                        const saleItems = products.filter(p => p.salePrice !== null);
                        reply = `We have active clearance sales on budget-friendly products today:\n\n` + 
                                saleItems.map(p => `• **${p.title}** - Special Price: ₹${p.salePrice} (M.R.P. ₹${p.price}!)`).join('\n');
                    } 
                    else if (promptLower.includes('tws') || promptLower.includes('earbuds') || promptLower.includes('headphone') || promptLower.includes('bud')) {
                        reply = "Check out our premium TWS audio selections:\n" +
                                "• **BudSync TWS Wireless Earbuds**: Special pricing at only **₹299**! Excellent battery backup & rich bass.\n" +
                                "• **SoundWave ANC Wireless Headphones**: Advanced active noise cancellation at ₹8,999.";
                    }
                    else if (promptLower.includes('powerbank') || promptLower.includes('battery') || promptLower.includes('charging') || promptLower.includes('power bank')) {
                        reply = "Check out our dynamic portable charger:\n" +
                                "• **BudSync Ultra-Slim 10000mAh Power Bank**: Listed at an unbelievable price of only **₹199**! Pocket-sized convenience.";
                    }
                    else if (promptLower.includes('tshirt') || promptLower.includes('tee') || promptLower.includes('t-shirt')) {
                        reply = "Upgrade your casual apparel:\n" +
                                "• **Classic Soft Cotton Crewneck Tee**: Incredibly comfortable fit, available for only **₹99**!";
                    }
                    else if (promptLower.includes('jeans') || promptLower.includes('denim')) {
                        reply = "Classic blue comfort stretch jeans:\n" +
                                "• **Classic Slim-Fit Denim Comfort Jeans**: Vintage finish comfort jeans available for **₹399**!";
                    }
                    else if (promptLower.includes('jewel') || promptLower.includes('gold') || promptLower.includes('necklace')) {
                        const items = products.filter(p => p.category === 'Artificial Jewellery');
                        reply = `Discover our shining Artificial Jewellery collection:\n\n` + 
                                items.map(p => `• **${p.title}** - ₹${p.salePrice || p.price}`).join('\n');
                    }
                    else {
                        reply = "I couldn't find a direct match. Try asking me for 'budget items under 400', 'Earbuds', 'Power Bank', 'Tshirt', or 'Jeans'!";
                    }

                    setChatMessages(prev => [...prev, { sender: 'assistant', text: reply }]);
                    setIsAiTyping(false);
                }, 1000);
            };

            return (
                <div className="min-h-screen bg-gray-50 flex flex-col font-sans text-gray-800 antialiased select-none">
                    
                    {/* Header Strip */}
                    <div className="bg-gradient-to-r from-indigo-700 via-purple-700 to-indigo-900 text-white text-xs font-semibold py-2 px-4 text-center flex items-center justify-center gap-2 no-print">
                        <Icon name="Percent" className="h-4 w-4 animate-bounce" />
                        <span>FESTIVE SALE! Save big with 18% GST benefits and free PAN-India express home delivery on all order checkouts today!</span>
                    </div>

                    <header className="sticky top-0 z-40 bg-white border-b border-gray-200 shadow-sm no-print">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between gap-4">
                            
                            {/* Brand Logo */}
                            <div 
                                onClick={() => { setCurrentView('home'); setSelectedCategory('All'); }} 
                                className="flex items-center gap-2 cursor-pointer group"
                            >
                                <div className="bg-indigo-600 text-white p-2 rounded-lg shadow-md group-hover:bg-indigo-700 transition">
                                    <Icon name="ShoppingBag" className="h-6 w-6" />
                                </div>
                                <span className="font-extrabold text-2xl tracking-tight bg-gradient-to-r from-indigo-600 via-purple-600 to-indigo-800 bg-clip-text text-transparent">
                                    Shopify<span className="text-gray-900">.Lite</span>
                                </span>
                            </div>

                            {/* Catalog Search Bar */}
                            <div className="hidden md:flex flex-1 max-w-lg relative">
                                <Icon name="Search" className="absolute left-3 top-2.5 h-5 w-5 text-gray-400" />
                                <input
                                    type="text"
                                    placeholder="Search clothes, earbuds, powerbanks, running shoes..."
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    className="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-full focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm transition"
                                />
                                {searchTerm && (
                                    <Icon 
                                        name="X" 
                                        onClick={() => setSearchTerm('')} 
                                        className="absolute right-3 top-2.5 h-5 w-5 text-gray-400 cursor-pointer hover:text-gray-600" 
                                    />
                                )}
                            </div>

                            {/* Control Actions */}
                            <div className="flex items-center gap-2 sm:gap-4">
                                <button 
                                    onClick={() => { setCurrentView('home'); setSelectedCategory('All'); }}
                                    className={`text-sm font-medium px-3 py-2 rounded-md transition ${currentView === 'home' ? 'text-indigo-600 bg-indigo-50 font-bold' : 'text-gray-600 hover:bg-gray-100'}`}
                                >
                                    Shop Catalog
                                </button>

                                {isAuthenticated ? (
                                    <div className="flex items-center gap-2">
                                        {currentUser.role === 'seller' ? (
                                            <button 
                                                onClick={() => setCurrentView('seller-dashboard')}
                                                className="bg-indigo-50 text-indigo-700 text-xs font-semibold px-3 py-1.5 rounded-lg border border-indigo-200 hover:bg-indigo-100 flex items-center gap-1.5"
                                            >
                                                <Icon name="Package" className="h-4 w-4" />
                                                <span>Merchant Dashboard</span>
                                            </button>
                                        ) : (
                                            <button 
                                                onClick={() => setCurrentView('customer-dashboard')}
                                                className="bg-purple-50 text-purple-700 text-xs font-semibold px-3 py-1.5 rounded-lg border border-purple-200 hover:bg-purple-100 flex items-center gap-1.5"
                                            >
                                                <Icon name="User" className="h-4 w-4" />
                                                <span>My Account</span>
                                            </button>
                                        )}

                                        <button 
                                            onClick={handleLogout}
                                            title="Logout"
                                            className="p-2 text-gray-500 hover:text-red-600 rounded-full hover:bg-gray-100 transition"
                                        >
                                            <Icon name="LogOut" className="h-5 w-5" />
                                        </button>
                                    </div>
                                ) : (
                                    <button 
                                        onClick={() => { setAuthRole('customer'); setShowAuthModal(true); }}
                                        className="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-4 py-2 rounded-full shadow-sm flex items-center gap-1.5 transition"
                                    >
                                        <Icon name="User" className="h-4 w-4" />
                                        <span>Sign In</span>
                                    </button>
                                )}

                                {/* Shopping Cart */}
                                <div className="relative">
                                    <button 
                                        onClick={() => setCurrentView('cart')}
                                        className="p-2.5 text-gray-700 hover:text-indigo-600 rounded-full hover:bg-gray-100 relative transition"
                                        aria-label="Cart"
                                    >
                                        <Icon name="ShoppingCart" className="h-5.5 w-5.5" />
                                        {cart.length > 0 && (
                                            <span className="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] font-bold h-5 w-5 flex items-center justify-center rounded-full border-2 border-white animate-pulse">
                                                {cart.reduce((tot, i) => tot + i.quantity, 0)}
                                            </span>
                                        )}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Mobile Search */}
                    <div className="md:hidden block bg-white px-4 py-2.5 border-b border-gray-200 no-print">
                        <div className="relative">
                            <Icon name="Search" className="absolute left-3 top-2.5 h-4 w-4 text-gray-400" />
                            <input
                                type="text"
                                placeholder="Search clothes, earbuds, powerbanks..."
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                                className="w-full pl-9 pr-8 py-2 border border-gray-300 rounded-full text-xs"
                            />
                            {searchTerm && (
                                <Icon 
                                    name="X"
                                    onClick={() => setSearchTerm('')} 
                                    className="absolute right-3 top-2.5 h-4 w-4 text-gray-400" 
                                />
                            )}
                        </div>
                    </div>

                    {/* Toast Notification System */}
                    {toast && (
                        <div className="fixed bottom-4 left-4 z-50 no-print">
                            <div className={`shadow-2xl rounded-xl p-4 flex items-center gap-3 border ${
                                toast.type === 'error' ? 'bg-red-50 border-red-200 text-red-800' :
                                toast.type === 'warning' ? 'bg-amber-50 border-amber-200 text-amber-800' :
                                'bg-emerald-50 border-emerald-200 text-emerald-800'
                            }`}>
                                <span className="font-semibold text-xs">{toast.message}</span>
                            </div>
                        </div>
                    )}

                    <main className="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-6">
                        
                        {/* 1. Main Storefront Catalog View */}
                        {currentView === 'home' && (
                            <>
                                {/* Large Promotional Campaign Slide */}
                                <div className="mb-8 rounded-2xl overflow-hidden bg-gradient-to-r from-indigo-900 via-purple-900 to-slate-900 text-white p-6 sm:p-10 relative shadow-lg">
                                    <div className="max-w-md relative z-10">
                                        <span className="bg-amber-400 text-amber-950 text-xs uppercase tracking-widest font-extrabold px-2.5 py-1 rounded-full inline-block">
                                            Festive Special Offers
                                        </span>
                                        <h1 className="text-3xl sm:text-4xl font-black tracking-tight mt-4 leading-tight">
                                            Premium Fashion & Tech Bargains
                                        </h1>
                                        <p className="text-gray-300 mt-2 text-sm sm:text-base leading-relaxed">
                                            Check our new ultra-value budget-range starting at only ₹99! Discover smart ear buds, cotton apparel, clean serums, and jewellery with GST invoice support.
                                        </p>
                                        <div className="mt-6 flex flex-wrap gap-3">
                                            <button 
                                                onClick={() => { setOnlySales(true); }}
                                                className="bg-white text-indigo-900 font-bold px-5 py-2.5 rounded-lg text-xs flex items-center gap-1.5 hover:bg-gray-100 transition shadow"
                                            >
                                                <Icon name="Percent" className="h-4 w-4 text-indigo-600" /> View Clearance Sales
                                            </button>
                                            <button 
                                                onClick={() => { setOnlySales(false); setSelectedCategory('All'); }}
                                                className="bg-indigo-600 hover:bg-indigo-500 font-semibold px-5 py-2.5 rounded-lg text-xs text-white transition"
                                            >
                                                Reset Filter
                                            </button>
                                        </div>
                                    </div>
                                    <div className="absolute top-0 right-0 w-80 h-80 bg-indigo-500 rounded-full filter blur-3xl opacity-20 -mr-20 -mt-20"></div>
                                    <div className="absolute -bottom-20 right-20 w-80 h-80 bg-purple-500 rounded-full filter blur-3xl opacity-25"></div>
                                </div>

                                <div className="mb-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                                    <div>
                                        <h2 className="text-xl font-bold text-gray-900">Explore Market Hubs</h2>
                                        <p className="text-xs text-gray-500 mt-0.5">Find premium products with tax invoice options</p>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <button
                                            onClick={() => setOnlySales(!onlySales)}
                                            className={`text-xs font-bold px-3 py-1.5 rounded-full border transition flex items-center gap-1 ${
                                                onlySales 
                                                    ? 'bg-amber-100 border-amber-300 text-amber-800' 
                                                    : 'bg-white border-gray-300 text-gray-600 hover:bg-gray-50'
                                            }`}
                                        >
                                            <Icon name="Tag" className="h-3 w-3" /> Sale Only
                                        </button>
                                    </div>
                                </div>

                                {/* Sliding Filter Pills */}
                                <div className="flex items-center gap-2 overflow-x-auto pb-4 scrollbar-hide">
                                    {CATEGORIES.map((category) => (
                                        <button
                                            key={category}
                                            onClick={() => setSelectedCategory(category)}
                                            className={`whitespace-nowrap px-4 py-2 rounded-full text-xs font-semibold transition ${
                                                selectedCategory === category
                                                    ? 'bg-indigo-600 text-white shadow-md'
                                                    : 'bg-white text-gray-600 border border-gray-200 hover:border-gray-300'
                                            }`}
                                        >
                                            {category}
                                        </button>
                                    ))}
                                </div>

                                {/* Active Product Grid */}
                                <div className="mt-4">
                                    <div className="flex justify-between items-center mb-4">
                                        <span className="text-xs font-semibold text-gray-500 uppercase tracking-wider">
                                            Displaying {filteredProducts.length} premium products
                                        </span>
                                    </div>

                                    {filteredProducts.length === 0 ? (
                                        <div className="bg-white rounded-xl border border-gray-200 p-12 text-center max-w-md mx-auto mt-6">
                                            <div className="bg-gray-100 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-4 text-gray-400">
                                                <Icon name="Search" className="h-6 w-6" />
                                            </div>
                                            <h3 className="text-base font-bold text-gray-900">No products match your parameters</h3>
                                            <p className="text-xs text-gray-500 mt-1">Try resetting the selected categories or clearing your search text.</p>
                                            <button 
                                                onClick={() => { setSelectedCategory('All'); setSearchTerm(''); setOnlySales(false); }}
                                                className="mt-4 text-xs font-semibold text-indigo-600 hover:text-indigo-800 underline"
                                            >
                                                Clear All Filters
                                            </button>
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                                            {filteredProducts.map((product) => {
                                                const isOnSale = product.salePrice !== null;
                                                return (
                                                    <div 
                                                        key={product.id} 
                                                        className="bg-white rounded-2xl border border-gray-200 shadow-sm hover:shadow-md transition duration-200 overflow-hidden flex flex-col group relative"
                                                    >
                                                        {isOnSale && (
                                                            <span className="absolute top-3 left-3 bg-red-500 text-white font-black text-[9px] px-2 py-0.5 rounded-full z-10 flex items-center gap-0.5 shadow-sm">
                                                                <Icon name="Percent" className="h-2.5 w-2.5" /> SPECIAL DISCOUNT
                                                            </span>
                                                        )}

                                                        <div 
                                                            onClick={() => { setSelectedProduct(product); setCurrentView('detail'); }}
                                                            className="h-48 w-full overflow-hidden bg-gray-100 cursor-pointer relative"
                                                        >
                                                            <img 
                                                                src={product.image} 
                                                                alt={product.title}
                                                                onError={(e) => {
                                                                    e.target.onerror = null;
                                                                    e.target.src = `https://placehold.co/600x480/4f46e5/ffffff?text=${encodeURIComponent(product.title)}`;
                                                                }}
                                                                className="w-full h-full object-cover group-hover:scale-105 transition duration-300"
                                                            />
                                                        </div>

                                                        <div className="p-4 flex-1 flex flex-col">
                                                            <span className="text-[10px] font-bold text-indigo-600 uppercase tracking-wider block">
                                                                {product.category}
                                                            </span>

                                                            <h3 
                                                                onClick={() => { setSelectedProduct(product); setCurrentView('detail'); }}
                                                                className="font-bold text-gray-900 text-sm mt-1 line-clamp-2 hover:text-indigo-600 cursor-pointer min-h-[40px] leading-tight"
                                                            >
                                                                {product.title}
                                                            </h3>

                                                            <div className="flex items-center justify-between mt-2">
                                                                <div className="flex items-center gap-1 text-amber-500">
                                                                    <Icon name="Star" className="h-3.5 w-3.5" fill="currentColor" />
                                                                    <span className="text-xs font-bold text-gray-700">{product.rating}</span>
                                                                    <span className="text-[10px] text-gray-400">({product.reviewsCount})</span>
                                                                </div>
                                                                
                                                                {product.stock > 0 ? (
                                                                    <span className="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-1.5 py-0.5 rounded">
                                                                        {product.stock} left
                                                                    </span>
                                                                ) : (
                                                                    <span className="text-[10px] font-bold text-red-600 bg-red-50 px-1.5 py-0.5 rounded">
                                                                        Out of Stock
                                                                    </span>
                                                                )}
                                                            </div>

                                                            <div className="mt-4 pt-3 border-t border-gray-100 flex items-center justify-between gap-2 mt-auto">
                                                                <div>
                                                                    {isOnSale ? (
                                                                        <div className="flex flex-col">
                                                                            <span className="text-xs line-through text-gray-400 font-semibold">
                                                                                ₹{product.price.toLocaleString('en-IN', { maximumFractionDigits: 2 })}
                                                                            </span>
                                                                            <span className="text-base font-extrabold text-red-600">
                                                                                ₹{product.salePrice.toLocaleString('en-IN', { maximumFractionDigits: 2 })}
                                                                            </span>
                                                                        </div>
                                                                    ) : (
                                                                        <span className="text-base font-extrabold text-gray-900">
                                                                            ₹{product.price.toLocaleString('en-IN', { maximumFractionDigits: 2 })}
                                                                        </span>
                                                                    )}
                                                                </div>

                                                                {product.stock === 0 ? (
                                                                    <span className="bg-red-50 text-red-600 text-[10px] font-bold px-2 py-1.5 rounded">
                                                                        Sold Out
                                                                    </span>
                                                                ) : (
                                                                    <button
                                                                        onClick={() => addToCart(product)}
                                                                        className="bg-indigo-600 hover:bg-indigo-700 text-white p-2 rounded-lg transition shadow-sm hover:shadow active:scale-95"
                                                                        title="Add to Bag"
                                                                    >
                                                                        <Icon name="Plus" className="h-4 w-4" />
                                                                    </button>
                                                                )}
                                                            </div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                            </>
                        )}

                        {/* 2. Detailed Single Product Page */}
                        {currentView === 'detail' && selectedProduct && (
                            <div className="bg-white rounded-3xl border border-gray-200 overflow-hidden shadow-sm p-4 sm:p-8 max-w-4xl mx-auto mt-4">
                                <button 
                                    onClick={() => setCurrentView('home')} 
                                    className="mb-6 flex items-center text-xs font-bold text-indigo-600 hover:text-indigo-800 gap-1"
                                >
                                    ← Back to Shopping Catalog
                                </button>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="rounded-2xl overflow-hidden bg-gray-50 border border-gray-100 relative max-h-96">
                                        <img 
                                            src={selectedProduct.image} 
                                            alt={selectedProduct.title}
                                            onError={(e) => {
                                                e.target.onerror = null;
                                                e.target.src = `https://placehold.co/600x480/4f46e5/ffffff?text=${encodeURIComponent(selectedProduct.title)}`;
                                            }}
                                            className="w-full h-full object-cover"
                                        />
                                        {selectedProduct.salePrice && (
                                            <span className="absolute top-4 left-4 bg-red-500 text-white text-xs font-black px-3 py-1 rounded-full shadow-md">
                                                FESTIVE DEAL
                                            </span>
                                        )}
                                    </div>

                                    <div className="flex flex-col justify-between">
                                        <div>
                                            <span className="bg-indigo-100 text-indigo-800 text-[10px] font-extrabold px-2.5 py-1 rounded-full uppercase tracking-wider inline-block">
                                                {selectedProduct.category}
                                            </span>

                                            <h1 className="text-2xl font-black text-gray-900 mt-3 leading-snug">
                                                {selectedProduct.title}
                                            </h1>

                                            <div className="flex items-center gap-1 text-amber-500 mt-2.5">
                                                {[1,2,3,4,5].map((s) => (
                                                    <Icon key={s} name="Star" className="h-4 w-4" fill="currentColor" />
                                                ))}
                                                <span className="text-xs font-bold text-gray-700 ml-1">{selectedProduct.rating} Stars</span>
                                                <span className="text-xs text-gray-400">({selectedProduct.reviewsCount} reviews)</span>
                                            </div>

                                            <div className="my-4 pt-3 pb-3 border-y border-gray-100">
                                                {selectedProduct.salePrice ? (
                                                    <div className="flex flex-wrap items-baseline gap-3">
                                                        <span className="text-2xl font-extrabold text-red-600">
                                                            ₹{selectedProduct.salePrice.toLocaleString('en-IN', { maximumFractionDigits: 2 })}
                                                        </span>
                                                        <span className="text-sm line-through text-gray-400 font-semibold">
                                                            M.R.P. ₹{selectedProduct.price.toLocaleString('en-IN', { maximumFractionDigits: 2 })}
                                                        </span>
                                                        <span className="bg-emerald-50 text-emerald-700 text-[10px] font-extrabold px-2 py-0.5 rounded border border-emerald-100">
                                                            Save ₹{(selectedProduct.price - selectedProduct.salePrice).toLocaleString('en-IN', { maximumFractionDigits: 2 })}
                                                        </span>
                                                    </div>
                                                ) : (
                                                    <span className="text-2xl font-extrabold text-gray-900">
                                                        ₹{selectedProduct.price.toLocaleString('en-IN', { maximumFractionDigits: 2 })}
                                                    </span>
                                                )}
                                            </div>

                                            <p className="text-xs text-gray-600 leading-relaxed mt-2">
                                                {selectedProduct.description}
                                            </p>

                                            <div className="mt-4 flex items-center gap-2">
                                                <span className="text-xs font-bold text-gray-700">Stock Status:</span>
                                                {selectedProduct.stock > 0 ? (
                                                    <span className="text-xs font-semibold text-emerald-600 bg-emerald-50 px-2 py-1 rounded">
                                                        {selectedProduct.stock} items left in stock
                                                    </span>
                                                ) : (
                                                    <span className="text-xs font-semibold text-red-600 bg-red-50 px-2 py-1 rounded">
                                                        Out of Stock
                                                    </span>
                                                )}
                                            </div>
                                        </div>

                                        <div className="mt-8 pt-4 border-t border-gray-100">
                                            {selectedProduct.stock > 0 ? (
                                                <button
                                                    onClick={() => addToCart(selectedProduct)}
                                                    className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl transition flex items-center justify-center gap-2 shadow-md hover:shadow-lg"
                                                >
                                                    <Icon name="ShoppingCart" className="h-5 w-5" />
                                                    Add to Shopping Bag
                                                </button>
                                            ) : (
                                                <button
                                                    disabled
                                                    className="w-full bg-gray-200 text-gray-500 font-bold py-3 px-6 rounded-xl cursor-not-allowed"
                                                >
                                                    Out of Stock
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 3. Shopping Cart Panel */}
                        {currentView === 'cart' && (
                            <div className="max-w-4xl mx-auto mt-4">
                                <h1 className="text-2xl font-extrabold text-gray-900 mb-6 flex items-center gap-2">
                                    <Icon name="ShoppingCart" className="h-6 w-6 text-indigo-600" />
                                    Your Shopping Bag
                                </h1>

                                {cart.length === 0 ? (
                                    <div className="bg-white border border-gray-200 rounded-3xl p-12 text-center shadow-xs">
                                        <Icon name="ShoppingBag" className="h-14 w-14 text-gray-300 mx-auto mb-4" />
                                        <h2 className="text-lg font-bold text-gray-900">Your shopping bag is empty!</h2>
                                        <p className="text-xs text-gray-500 mt-1 max-w-sm mx-auto">
                                            Explore our selection of suits, premium footwear, skincare serums, beauty products, or designer jewelry.
                                        </p>
                                        <button
                                            onClick={() => setCurrentView('home')}
                                            className="mt-6 inline-block bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-sm px-6 py-2.5 rounded-full transition shadow-sm"
                                        >
                                            Explore Store
                                        </button>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                        {/* Cart Listings */}
                                        <div className="lg:col-span-2 space-y-4">
                                            {cart.map((item) => (
                                                <div 
                                                    key={item.id} 
                                                    className="bg-white rounded-2xl border border-gray-200 p-4 flex gap-4 items-center"
                                                >
                                                    <div className="w-16 h-16 rounded-xl overflow-hidden bg-gray-50 flex-shrink-0">
                                                        <img 
                                                            src={item.image} 
                                                            alt={item.title} 
                                                            onError={(e) => {
                                                                e.target.onerror = null;
                                                                e.target.src = `https://placehold.co/120x120/4f46e5/ffffff?text=${encodeURIComponent(item.title)}`;
                                                            }}
                                                            className="w-full h-full object-cover" 
                                                        />
                                                    </div>

                                                    <div className="flex-1 min-w-0">
                                                        <h3 className="font-bold text-sm text-gray-900 truncate">{item.title}</h3>
                                                        <span className="text-[10px] text-indigo-600 font-semibold uppercase block">{item.category}</span>
                                                        <span className="text-xs font-bold text-gray-900 mt-1 block">
                                                            ₹{item.activePrice.toLocaleString('en-IN', { maximumFractionDigits: 2 })}
                                                        </span>
                                                    </div>

                                                    {/* Quantity adjustments */}
                                                    <div className="flex items-center gap-2 bg-gray-50 border border-gray-200 rounded-lg p-1">
                                                        <button 
                                                            onClick={() => updateCartQty(item.id, -1)}
                                                            className="p-1 hover:bg-gray-200 text-gray-600 rounded"
                                                        >
                                                            <Icon name="Minus" className="h-3 w-3" />
                                                        </button>
                                                        <span className="text-xs font-extrabold w-4 text-center">{item.quantity}</span>
                                                        <button 
                                                            onClick={() => updateCartQty(item.id, 1)}
                                                            className="p-1 hover:bg-gray-200 text-gray-600 rounded"
                                                        >
                                                            <Icon name="Plus" className="h-3 w-3" />
                                                        </button>
                                                    </div>

                                                    <button 
                                                        onClick={() => removeFromCart(item.id)}
                                                        className="p-2 text-gray-400 hover:text-red-500 rounded-full hover:bg-red-50 transition"
                                                    >
                                                        <Icon name="Trash2" className="h-4.5 w-4.5" />
                                                    </button>
                                                </div>
                                            ))}
                                        </div>

                                        {/* Bill Breakdown */}
                                        <div className="bg-white rounded-2xl border border-gray-200 p-6 shadow-sm h-fit">
                                            <h3 className="font-bold text-gray-900 text-base mb-4">Order Summary</h3>
                                            
                                            <div className="space-y-2 pb-4 border-b border-gray-100 text-xs text-gray-600">
                                                <div className="flex justify-between">
                                                    <span>Bag Subtotal ({cart.reduce((tot, i) => tot + i.quantity, 0)} items)</span>
                                                    <span>₹{cartSubtotal.toLocaleString('en-IN', { maximumFractionDigits: 2 })}</span>
                                                </div>
                                                <div className="flex justify-between items-center text-indigo-600 font-medium">
                                                    <span>GST Component (Standard 18%)</span>
                                                    <span>+ ₹{calculatedGSTAmount.toLocaleString('en-IN', { maximumFractionDigits: 2 })}</span>
                                                </div>
                                                <div className="flex justify-between">
                                                    <span>Delivery Charges</span>
                                                    <span className="text-emerald-600 font-bold">FREE EXPRESS</span>
                                                </div>
                                            </div>

                                            <div className="flex justify-between items-center py-4 text-sm font-bold text-gray-900">
                                                <span>Grand Total (Incl. GST)</span>
                                                <span className="text-lg text-indigo-700 font-extrabold">
                                                    ₹{cartGrandTotal.toLocaleString('en-IN', { maximumFractionDigits: 2 })}
                                                </span>
                                            </div>

                                            <button
                                                onClick={() => {
                                                    if (!isAuthenticated) {
                                                        setAuthRole('customer');
                                                        setShowAuthModal(true);
                                                        triggerToast("Please login using your phone number and password to complete order.", "warning");
                                                    } else {
                                                        setShowPaymentGate(true);
                                                    }
                                                }}
                                                className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl text-xs transition shadow-sm hover:shadow-md flex items-center justify-center gap-1.5"
                                            >
                                                <Icon name="ShieldCheck" className="h-4.5 w-4.5" /> Check Out Order Securely
                                            </button>
                                            
                                            <p className="text-[10px] text-gray-400 text-center mt-3 leading-relaxed">
                                                A digital GST-compliant tax invoice will be made available instantly inside your account dashboard.
                                            </p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* 4. Customer Workspace Dashboard */}
                        {currentView === 'customer-dashboard' && (
                            <div className="max-w-4xl mx-auto mt-4 space-y-6">
                                <div className="bg-gradient-to-r from-purple-800 to-indigo-800 rounded-2xl p-6 text-white shadow">
                                    <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-6">
                                        <div className="space-y-3">
                                            <span className="text-xs font-bold uppercase tracking-widest text-purple-200">Buyer Account Center</span>
                                            <h1 className="text-2xl font-black mt-1 leading-tight">Namaste, {currentUser?.name || "Premium Guest"}</h1>
                                            
                                            {/* Delivery Address Visual Placement in Greeting Box */}
                                            <div className="flex items-start gap-2.5 text-xs text-purple-100 max-w-xl bg-purple-900/30 p-3 rounded-xl border border-purple-700/40 shadow-inner">
                                                <Icon name="MapPin" className="h-4 w-4 mt-0.5 text-amber-400 flex-shrink-0" />
                                                <div className="min-w-0">
                                                    <strong className="text-[10px] uppercase tracking-wider font-extrabold text-purple-200 block mb-0.5">Shipping Address Coordinates:</strong>
                                                    <span className="font-medium break-words leading-relaxed">{profileAddress || "Please register your primary address in settings below."}</span>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="bg-white/10 backdrop-blur-sm p-4 rounded-xl text-xs space-y-1.5 min-w-[224px] border border-white/10 h-fit">
                                            <div className="flex items-center gap-1.5"><Icon name="Smartphone" className="h-3.5 w-3.5" /> <span>{currentUser?.phone}</span></div>
                                            <div className="flex items-center gap-1.5"><Icon name="Mail" className="h-3.5 w-3.5" /> <span>{currentUser?.email}</span></div>
                                        </div>
                                    </div>
                                </div>

                                {/* PROFILE SETTINGS HUB WITH ADDRESS CONFIG */}
                                <div className="bg-white rounded-2xl border border-gray-200 p-6 shadow-sm">
                                    <h3 className="font-extrabold text-gray-900 text-sm mb-3 flex items-center gap-1.5 border-b border-gray-100 pb-2">
                                        <Icon name="User" className="h-4.5 w-4.5 text-indigo-600" /> Account Profile Settings
                                    </h3>
                                    <form onSubmit={handleSaveProfile} className="space-y-4 max-w-lg">
                                        <div>
                                            <label className="block text-[10px] font-extrabold text-gray-400 uppercase mb-1">Set Display Name</label>
                                            <input 
                                                type="text" 
                                                required
                                                placeholder="Enter display name (e.g., Rohit Kumar)" 
                                                value={profileDisplayName}
                                                onChange={(e) => setProfileDisplayName(e.target.value)}
                                                className="w-full text-xs px-3 py-2 border border-gray-300 rounded-xl focus:ring-1 focus:ring-indigo-500 bg-white"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-extrabold text-gray-400 uppercase mb-1">Default Shipping/Delivery Address</label>
                                            <textarea 
                                                required
                                                placeholder="Enter flat address, area/landmark, city, state" 
                                                value={profileAddress}
                                                onChange={(e) => setProfileAddress(e.target.value)}
                                                rows="2"
                                                className="w-full text-xs px-3 py-2 border border-gray-300 rounded-xl focus:ring-1 focus:ring-indigo-500 bg-white"
                                            />
                                        </div>
                                        <button 
                                            type="submit"
                                            className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-xl text-xs"
                                        >
                                            Save Profile Details
                                        </button>
                                    </form>
                                </div>

                                <h2 className="text-lg font-bold text-gray-900 mb-4 flex items-center gap-2">
                                    <Icon name="Truck" className="h-5 w-5 text-indigo-600" />
                                    Your Order History & Invoice Archives
                                </h2>

                                {orders.filter(o => o.customerPhone === currentUser?.phone).length === 0 ? (
                                    <div className="bg-white border border-gray-200 rounded-2xl p-8 text-center text-gray-500">
                                        You have not placed any orders yet. Check out item listings and place your first order.
                                    </div>
                                ) : (
                                    <div className="space-y-6">
                                        {orders.filter(o => o.customerPhone === currentUser?.phone).map((order) => (
                                            <div 
                                                key={order.id}
