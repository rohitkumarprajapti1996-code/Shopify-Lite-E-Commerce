                                                className="bg-white rounded-2xl border border-gray-200 p-6 shadow-xs flex flex-col gap-4"
                                            >
                                                <div className="flex flex-wrap items-center justify-between gap-4 pb-4 border-b border-gray-100">
                                                    <div>
                                                        <span className="text-xs font-bold text-gray-500">Order Reference</span>
                                                        <h4 className="font-black text-gray-900 text-sm">{order.id}</h4>
                                                    </div>
                                                    <div>
                                                        <span className="text-xs font-bold text-gray-500">Date</span>
                                                        <p className="text-xs font-semibold text-gray-700">{order.date}</p>
                                                    </div>
                                                    <div>
                                                        <span className="text-xs font-bold text-gray-500">Grand Total (Incl. GST)</span>
                                                        <p className="text-xs font-black text-indigo-600">
                                                            ₹{order.total.toLocaleString('en-IN', { maximumFractionDigits: 2 })}
                                                        </p>
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <button
                                                            onClick={() => setViewingInvoiceOrder(order)}
                                                            className="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 text-[10px] font-bold px-3 py-1.5 rounded-lg border border-indigo-150 flex items-center gap-1"
                                                        >
                                                            <Icon name="Receipt" className="h-3.5 w-3.5" />
                                                            View Tax Invoice
                                                        </button>
                                                    </div>
                                                </div>

                                                {/* Purchased product summaries */}
                                                <div>
                                                    <h5 className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Purchased Products</h5>
                                                    <div className="space-y-1.5">
                                                        {order.items.map((it, idx) => (
                                                            <div key={idx} className="flex justify-between items-center text-xs">
                                                                <span className="text-gray-700 font-medium">{it.title} <span className="text-gray-400">x{it.quantity}</span></span>
                                                                <span className="font-bold text-gray-900">
                                                                    ₹{(it.price * it.quantity).toLocaleString('en-IN', { maximumFractionDigits: 2 })}
                                                                </span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>

                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 bg-gray-50 p-4 rounded-xl border border-gray-100">
                                                    <div>
                                                        <h6 className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Payment Method</h6>
                                                        <span className="text-xs font-bold text-gray-800">{order.paymentMethod}</span>
                                                        <p className="text-[10px] text-gray-500 mt-0.5">ID: {order.transactionId}</p>
                                                    </div>
                                                    <div>
                                                        <h6 className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">GST Component (18%)</h6>
                                                        <span className="text-xs font-bold text-indigo-700">₹{order.gstAmount.toLocaleString('en-IN', { maximumFractionDigits: 2 })}</span>
                                                    </div>
                                                </div>

                                                {/* Tracking state monitor lines */}
                                                <div className="pt-2">
                                                    <h5 className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3">Shipment Progress</h5>
                                                    <div className="grid grid-cols-4 text-center gap-1 relative">
                                                        <div className="flex flex-col items-center">
                                                            <div className="w-6 h-6 rounded-full bg-indigo-600 text-white text-xs flex items-center justify-center font-bold z-10">1</div>
                                                            <span className="text-[10px] font-bold mt-1.5 block">Received</span>
                                                        </div>

                                                        <div className="flex flex-col items-center">
                                                            <div className={`w-6 h-6 rounded-full text-xs flex items-center justify-center font-bold z-10 ${
                                                                order.status === 'Ordered' ? 'bg-gray-200 text-gray-400' : 'bg-indigo-600 text-white'
                                                            }`}>2</div>
                                                            <span className="text-[10px] font-bold mt-1.5 block">Packed</span>
                                                        </div>

                                                        <div className="flex flex-col items-center">
                                                            <div className={`w-6 h-6 rounded-full text-xs flex items-center justify-center font-bold z-10 ${
                                                                order.status === 'Delivered' ? 'bg-indigo-600 text-white' : 
                                                                order.status === 'Shipped' ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-400'
                                                            }`}>3</div>
                                                            <span className="text-[10px] font-bold mt-1.5 block">Dispatched</span>
                                                        </div>

                                                        <div className="flex flex-col items-center">
                                                            <div className={`w-6 h-6 rounded-full text-xs flex items-center justify-center font-bold z-10 ${
                                                                order.status === 'Delivered' ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-400'
                                                            }`}>4</div>
                                                            <span className="text-[10px] font-bold mt-1.5 block">Delivered</span>
                                                        </div>

                                                        <div className="absolute top-3 left-6 right-6 h-0.5 bg-gray-200 -z-0"></div>
                                                    </div>
                                                    <div className="mt-4 pt-3 border-t border-gray-200/60 text-[10px] text-gray-500 flex justify-between">
                                                        <span><strong>Delivery Address:</strong> {order.shippingAddress}</span>
                                                        <span>Tracking Status: <strong className="text-indigo-700">{order.status}</strong></span>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* 5. Merchant Command Center Panel */}
                        {currentView === 'seller-dashboard' && (
                            <div className="space-y-8 mt-4">
                                <div className="bg-gradient-to-r from-slate-900 to-indigo-950 rounded-2xl p-6 text-white shadow-lg border border-slate-800">
                                    <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                                        <div>
                                            <span className="bg-indigo-500/20 text-indigo-300 text-xs font-bold uppercase tracking-wider px-2.5 py-1 rounded inline-block">
                                                Merchant Workspace
                                            </span>
                                            <h1 className="text-2xl font-black mt-2">Welcome Back, {currentUser?.name || "Merchant Admin"}</h1>
                                            <p className="text-xs text-gray-300">Oversee store listings, track incoming customer transfers, print tax invoices, and configure banking details.</p>
                                        </div>
                                        <div className="flex gap-2 text-xs">
                                            <div className="bg-white/10 px-4 py-2.5 rounded-xl border border-white/5 text-center">
                                                <span className="text-gray-400 block text-[10px]">TOTAL LISTINGS</span>
                                                <strong className="text-base text-white">{products.length} Items</strong>
                                            </div>
                                            <div className="bg-white/10 px-4 py-2.5 rounded-xl border border-white/5 text-center">
                                                <span className="text-gray-400 block text-[10px]">TOTAL STORE EARNINGS</span>
                                                <strong className="text-base text-amber-400">
                                                    ₹{merchantTotalIncoming.toLocaleString('en-IN', { maximumFractionDigits: 2 })}
                                                </strong>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Dashboard subnavigation tabs */}
                                <div className="flex items-center gap-2 border-b border-gray-200 pb-2 overflow-x-auto">
                                    <button 
                                        onClick={() => setSellerActiveTab('inventory')}
                                        className={`px-4 py-2 text-xs font-bold whitespace-nowrap rounded-lg transition ${sellerActiveTab === 'inventory' ? 'bg-indigo-600 text-white' : 'text-gray-600 hover:bg-gray-100'}`}
                                    >
                                        Store Listings ({products.length})
                                    </button>
                                    <button 
                                        onClick={() => setSellerActiveTab('add-listing')}
                                        className={`px-4 py-2 text-xs font-bold whitespace-nowrap rounded-lg transition ${sellerActiveTab === 'add-listing' ? 'bg-indigo-600 text-white' : 'text-gray-600 hover:bg-gray-100'}`}
                                    >
                                        Add New Listing
                                    </button>
                                    <button 
                                        onClick={() => setSellerActiveTab('payments')}
                                        className={`px-4 py-2 text-xs font-bold whitespace-nowrap rounded-lg transition ${sellerActiveTab === 'payments' ? 'bg-indigo-600 text-white' : 'text-gray-600 hover:bg-gray-100'}`}
                                    >
                                        Payments Received ({orders.length})
                                    </button>
                                    <button 
                                        onClick={() => setSellerActiveTab('bank-settlement')}
                                        className={`px-4 py-2 text-xs font-bold whitespace-nowrap rounded-lg transition ${sellerActiveTab === 'bank-settlement' ? 'bg-indigo-600 text-white' : 'text-gray-600 hover:bg-gray-100'}`}
                                    >
                                        Bank Payout Setup
                                    </button>
                                    <button 
                                        onClick={() => setSellerActiveTab('fulfillment')}
                                        className={`px-4 py-2 text-xs font-bold whitespace-nowrap rounded-lg transition ${sellerActiveTab === 'fulfillment' ? 'bg-indigo-600 text-white' : 'text-gray-600 hover:bg-gray-100'}`}
                                    >
                                        Fulfillment & Shipping ({orders.length})
                                    </button>
                                </div>

                                {/* Subtab 1: Inventory stock list with Backup Import/Export Tools */}
                                {sellerActiveTab === 'inventory' && (
                                    <div className="space-y-4">
                                        {/* Security Backup Control Row */}
                                        <div className="bg-indigo-50/50 border border-indigo-100 rounded-2xl p-4 flex flex-wrap items-center justify-between gap-4 text-xs">
                                            <div className="space-y-1">
                                                <h4 className="font-bold text-indigo-950 flex items-center gap-1">
                                                    <Icon name="ShieldCheck" className="h-4.5 w-4.5 text-indigo-600" /> Live Catalog Backup Utilities
                                                </h4>
                                                <p className="text-[11px] text-indigo-700">Export your product catalog or import standard backups to preserve custom uploads across incognito reloads.</p>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <button 
                                                    onClick={exportDatabaseJson}
                                                    className="bg-white hover:bg-indigo-100 text-indigo-700 font-bold py-2 px-3.5 rounded-xl border border-indigo-200 transition text-xxs flex items-center gap-1.5"
                                                >
                                                    <Icon name="Download" className="h-3.5 w-3.5" /> Export Catalog (JSON)
                                                </button>
                                                <button 
                                                    onClick={() => setShowImportArea(!showImportArea)}
                                                    className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-3.5 rounded-xl transition text-xxs flex items-center gap-1.5"
                                                >
                                                    <Icon name="Upload" className="h-3.5 w-3.5" /> Restore/Import Backup
                                                </button>
                                            </div>
                                        </div>

                                        {/* Paste Backup Container */}
                                        {showImportArea && (
                                            <form onSubmit={importDatabaseJson} className="bg-white border border-gray-200 rounded-2xl p-4 shadow-sm space-y-3">
                                                <h4 className="font-bold text-gray-900 text-xs">Paste Catalog JSON Backup</h4>
                                                <textarea 
                                                    rows="4"
                                                    required
                                                    value={importRawJson}
                                                    onChange={(e) => setImportRawJson(e.target.value)}
                                                    placeholder='Paste your backup data here. (Format: [{"title": "Classic soft tee", "price": 99, ...}])'
                                                    className="w-full text-xxs p-2 border border-gray-300 rounded-lg focus:ring-1 focus:ring-indigo-500 font-mono"
                                                />
                                                <div className="flex justify-end gap-2">
                                                    <button 
                                                        type="button"
                                                        onClick={() => { setImportRawJson(''); setShowImportArea(false); }}
                                                        className="text-gray-400 hover:text-gray-600 text-xxs font-semibold px-3 py-1.5"
                                                    >
                                                        Cancel
                                                    </button>
                                                    <button 
                                                        type="submit"
                                                        className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xxs px-4 py-1.5 rounded-lg"
                                                    >
                                                        Validate & Import
                                                    </button>
                                                </div>
                                            </form>
                                        )}

                                        <div className="bg-white rounded-2xl border border-gray-200 p-6 shadow-xs">
                                            <h3 className="font-extrabold text-gray-900 text-base mb-4 flex items-center gap-1.5">
                                                <Icon name="SlidersHorizontal" className="h-5 w-5 text-indigo-600" /> Currently Active Listings & Stock Audits
                                            </h3>

                                            <div className="space-y-3">
                                                {products.map((item) => (
                                                    <div 
                                                        key={item.id} 
                                                        className="flex flex-wrap items-center justify-between p-3 border border-gray-100 rounded-xl hover:bg-gray-50 transition text-xs gap-4"
                                                    >
                                                        <div className="flex items-center gap-3 min-w-0">
                                                            <img 
                                                                src={item.image} 
                                                                alt={item.title} 
                                                                onError={(e) => {
                                                                    e.target.onerror = null;
                                                                    e.target.src = `https://placehold.co/80x80/4f46e5/ffffff?text=${encodeURIComponent(item.title)}`;
                                                                }}
                                                                className="w-10 h-10 object-cover rounded-md" 
                                                            />
                                                            <div className="min-w-0">
                                                              <h4 className="font-bold text-gray-900 truncate">{item.title}</h4>
                                                              <span className="text-[10px] text-indigo-600 uppercase font-semibold">{item.category}</span>
                                                            </div>
                                                        </div>

                                                        <div className="flex items-center gap-6">
                                                            <div className="text-right">
                                                                <span className="text-[10px] text-gray-400 block">Unit Selling Price</span>
                                                                <span className="font-bold text-gray-900">
                                                                    ₹{(item.salePrice || item.price).toLocaleString('en-IN', { maximumFractionDigits: 2 })}
                                                                </span>
                                                            </div>
                                                            <div className="text-right">
                                                                <span className="text-[10px] text-gray-400 block">Inventory</span>
                                                                <span className={`font-bold ${item.stock === 0 ? 'text-red-500' : 'text-gray-700'}`}>
                                                                    {item.stock} left
                                                                </span>
                                                            </div>
                                                            
                                                            <button
                                                                onClick={() => deleteProductBySeller(item.id)}
                                                                className="p-1.5 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded transition"
                                                                title="Delete Listing"
                                                            >
                                                                <Icon name="Trash2" className="h-4.5 w-4.5" />
                                                            </button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* Subtab 2: Form to register a new product */}
                                {sellerActiveTab === 'add-listing' && (
                                    <div className="bg-white rounded-2xl border border-gray-200 p-6 max-w-2xl mx-auto">
                                        <h3 className="font-extrabold text-gray-900 text-base mb-4 flex items-center gap-1.5">
                                            <Icon name="Plus" className="h-5 w-5 text-indigo-600" /> List a Premium Item
                                        </h3>
                                        
                                        <form onSubmit={handleAddProductSubmit} className="space-y-4">
                                            <div>
                                                <label className="block text-[10px] font-extrabold text-gray-500 uppercase mb-1">Product Title *</label>
                                                <input 
                                                    type="text" 
                                                    placeholder="e.g. 18K Emerald Choker Pendant"
                                                    required
                                                    value={newProduct.title}
                                                    onChange={(e) => setNewProduct({ ...newProduct, title: e.target.value })}
                                                    className="w-full text-xs px-3 py-2 border border-gray-300 rounded-lg focus:ring-1 focus:ring-indigo-500"
                                                />
                                            </div>

                                            <div>
                                                <label className="block text-[10px] font-extrabold text-gray-500 uppercase mb-1">Product Description</label>
                                                <textarea 
                                                    placeholder="Describe custom features, size benchmarks, and package dimensions..."
                                                    rows="3"
                                                    value={newProduct.description}
                                                    onChange={(e) => setNewProduct({ ...newProduct, description: e.target.value })}
                                                    className="w-full text-xs px-3 py-2 border border-gray-300 rounded-lg focus:ring-1 focus:ring-indigo-500"
                                                ></textarea>
                                            </div>

                                            <div className="grid grid-cols-2 gap-3">
                                                <div>
                                                    <label className="block text-[10px] font-extrabold text-gray-500 uppercase mb-1">M.R.P (₹) *</label>
                                                    <input 
                                                        type="number" 
                                                        step="0.01"
                                                        placeholder="2499"
                                                        required
                                                        value={newProduct.price}
                                                        onChange={(e) => setNewProduct({ ...newProduct, price: e.target.value })}
                                                        className="w-full text-xs px-3 py-2 border border-gray-300 rounded-lg focus:ring-1 focus:ring-indigo-500"
                                                    />
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] font-extrabold text-gray-500 uppercase mb-1">Offer Sale Price (₹)</label>
                                                    <input 
                                                        type="number" 
                                                        step="0.01"
                                                        placeholder="Leave empty if not on sale"
                                                        value={newProduct.salePrice}
                                                        onChange={(e) => setNewProduct({ ...newProduct, salePrice: e.target.value })}
                                                        className="w-full text-xs px-3 py-2 border border-gray-300 rounded-lg focus:ring-1 focus:ring-indigo-500"
                                                    />
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-2 gap-3">
                                                <div>
                                                    <label className="block text-[10px] font-extrabold text-gray-500 uppercase mb-1">Market Segment *</label>
                                                    <select
                                                        value={newProduct.category}
                                                        onChange={(e) => setNewProduct({ ...newProduct, category: e.target.value })}
                                                        className="w-full text-xs px-2.5 py-2 border border-gray-300 rounded-lg focus:ring-1 focus:ring-indigo-500 bg-white"
                                                    >
                                                        {CATEGORIES.filter(c => c !== 'All').map(cat => (
                                                            <option key={cat} value={cat}>{cat}</option>
                                                        ))}
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] font-extrabold text-gray-500 uppercase mb-1">Stock Qty *</label>
                                                    <input 
                                                        type="number" 
                                                        placeholder="50"
                                                        required
                                                        value={newProduct.stock}
                                                        onChange={(e) => setNewProduct({ ...newProduct, stock: e.target.value })}
                                                        className="w-full text-xs px-3 py-2 border border-gray-300 rounded-lg focus:ring-1 focus:ring-indigo-500"
                                                    />
                                                </div>
                                            </div>

                                            <div>
                                                <label className="block text-[10px] font-extrabold text-gray-500 uppercase mb-1">Product Photo Link</label>
                                                <input 
                                                    type="text" 
                                                    placeholder="Paste image URL"
                                                    value={newProduct.image}
                                                    onChange={(e) => setNewProduct({ ...newProduct, image: e.target.value })}
                                                    className="w-full text-xs px-3 py-2 border border-gray-300 rounded-lg focus:ring-1 focus:ring-indigo-500"
                                                />
                                            </div>

                                            <div>
                                                <label className="block text-[10px] font-extrabold text-gray-500 uppercase mb-1">Tags (Comma-separated)</label>
                                                <input 
                                                    type="text" 
                                                    placeholder="e.g. Traditional, Necklaces, Silk"
                                                    value={newProduct.tags}
                                                    onChange={(e) => setNewProduct({ ...newProduct, tags: e.target.value })}
                                                    className="w-full text-xs px-3 py-2 border border-gray-300 rounded-lg focus:ring-1 focus:ring-indigo-500"
                                                />
                                            </div>

                                            <button
                                                type="submit"
                                                className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-xl text-xs transition"
                                            >
                                                Publish Listing Live
                                            </button>
                                        </form>
                                    </div>
                                )}

                                {/* Subtab 3: Payments received tracker */}
                                {sellerActiveTab === 'payments' && (
                                    <div className="bg-white rounded-2xl border border-gray-200 p-6 shadow-xs space-y-6">
                                        <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 border-b border-gray-100 pb-4">
                                            <div>
                                                <h3 className="font-extrabold text-gray-900 text-base flex items-center gap-1.5">
                                                    <Icon name="QrCode" className="h-5 w-5 text-indigo-600" /> Store Receipts & Tax Ledger
                                                </h3>
                                                <p className="text-[10px] text-gray-500 mt-0.5">Real-time audited transaction history containing 18% GST collection indicators</p>
                                            </div>
                                            
                                            <div className="flex items-center gap-3">
                                                <div className="bg-indigo-50 border border-indigo-100 rounded-xl p-3 text-center">
                                                    <span className="text-[9px] text-indigo-600 font-extrabold block uppercase tracking-wider">Total GST Collected</span>
                                                    <strong className="text-sm font-black text-indigo-900">
                                                        ₹{orders.reduce((acc, o) => acc + o.gstAmount, 0).toLocaleString('en-IN', { maximumFractionDigits: 2 })}
                                                    </strong>
                                                </div>
                                                <div className="bg-emerald-50 border border-emerald-100 rounded-xl p-3 text-center">
                                                    <span className="text-[9px] text-emerald-600 font-extrabold block uppercase tracking-wider">Net Store Revenue</span>
                                                    <strong className="text-sm font-black text-emerald-900">
                                                        ₹{merchantTotalIncoming.toLocaleString('en-IN', { maximumFractionDigits: 2 })}

                                                </div>

                                                        <div className="flex items-center gap-1.5 text-[10px] text-gray-600">

                                                            <button 
                                                                type="button" 
                                                                onClick={() => copyToClipboard('rohitkumarprajapti1996-2@okaxis')}

                                                />
                                            </div>

                                            <div>
                                                <label className="block text-[10px] font-extrabold text-gray-500 uppercase mb-1">Credit Card Number</label>
                                                <input 
                                                    type="text"
                                                    maxLength="19"
                                                    placeholder="XXXX - XXXX - XXXX - XXXX"
                                                    value={paymentCardNumber}
                                                    onChange={(e) => setPaymentCardNumber(e.target.value)}
                                                    className="w-full text-xs px-3 py-2 border border-gray-300 rounded-xl focus:ring-1 focus:ring-indigo-500 bg-white"
                                                />
                                            </div>

                                            <div className="grid grid-cols-2 gap-3">
                                                <div>
                                                    <label className="block text-[10px] font-extrabold text-gray-500 uppercase mb-1">Expiry Date</label>
                                                    <input 
                                                        type="text"
                                                        placeholder="MM / YY"
                                                        maxLength="5"
                                                        value={paymentCardExpiry}
                                                        onChange={(e) => setPaymentCardExpiry(e.target.value)}
                                                        className="w-full text-xs px-3 py-2 border border-gray-300 rounded-xl focus:ring-1 focus:ring-indigo-500 text-center bg-white"
                                                    />
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] font-extrabold text-gray-500 uppercase mb-1">CVV / Secure Code</label>
                                                    <input 
                                                        type="password"
                                                        placeholder="•••"
                                                        maxLength="3"
                                                        value={paymentCardCvv}
                                                        onChange={(e) => setPaymentCardCvv(e.target.value)}
                                                        className="w-full text-xs px-3 py-2 border border-gray-300 rounded-xl focus:ring-1 focus:ring-indigo-500 text-center bg-white"
                                                    />
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {selectedPaymentMethod === 'debit' && (
                                        <div className="bg-gray-50 rounded-2xl p-4 border border-gray-200/60 space-y-3">
                                            <div>
                                                <label className="block text-[10px] font-extrabold text-gray-500 uppercase mb-1">Cardholder Full Name</label>
                                                <input 
                                                    type="text"
                                                    placeholder="e.g. PRIYA ARORA"
                                                    value={paymentCardName}
                                                    onChange={(e) => setPaymentCardName(e.target.value.toUpperCase())}
                                                    className="w-full text-xs px-3 py-2 border border-gray-300 rounded-xl focus:ring-1 focus:ring-indigo-500 bg-white"
                                                />
                                            </div>

                                            <div>
                                                <label className="block text-[10px] font-extrabold text-gray-500 uppercase mb-1">Debit Card Number</label>
                                                <input 
                                                    type="text"
                                                    maxLength="19"
                                                    placeholder="4000 - XXXX - XXXX - XXXX"
                                                    value={paymentCardNumber}
                                                    onChange={(e) => setPaymentCardNumber(e.target.value)}
                                                    className="w-full text-xs px-3 py-2 border border-gray-300 rounded-xl focus:ring-1 focus:ring-indigo-500 bg-white"
                                                />
                                            </div>

                                            <div className="grid grid-cols-2 gap-3">
                                                <div>
                                                    <label className="block text-[10px] font-extrabold text-gray-500 uppercase mb-1">Expiry Date</label>
                                                    <input 
                                                        type="text"
                                                        placeholder="MM / YY"
                                                        maxLength="5"
                                                        value={paymentCardExpiry}
                                                        onChange={(e) => setPaymentCardExpiry(e.target.value)}
                                                        className="w-full text-xs px-3 py-2 border border-gray-300 rounded-xl focus:ring-1 focus:ring-indigo-500 text-center bg-white"
                                                    />
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] font-extrabold text-gray-500 uppercase mb-1">CVV</label>
                                                    <input 
                                                        type="password"
                                                        placeholder="•••"
                                                        maxLength="3"
                                                        value={paymentCardCvv}
                                                        onChange={(e) => setPaymentCardCvv(e.target.value)}
                                                        className="w-full text-xs px-3 py-2 border border-gray-300 rounded-xl focus:ring-1 focus:ring-indigo-500 text-center bg-white"
                                                    />
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {selectedPaymentMethod === 'netbanking' && (
                                        <div className="bg-gray-50 rounded-2xl p-4 border border-gray-200/60 space-y-3">
                                            <div>
                                                <label className="block text-[10px] font-extrabold text-gray-500 uppercase mb-1 font-bold">Select Bank Hub</label>
                                                <select
                                                    value={paymentNetBank}
                                                    onChange={(e) => setPaymentNetBank(e.target.value)}
                                                    className="w-full text-xs px-3 py-2.5 border border-gray-300 rounded-xl bg-white text-gray-800 focus:ring-1 focus:ring-indigo-500"
                                                >
                                                    <option value="State Bank of India">State Bank of India (SBI)</option>
                                                    <option value="HDFC Bank">HDFC Bank</option>
                                                    <option value="ICICI Bank">ICICI Bank</option>
                                                    <option value="Axis Bank">Axis Bank</option>
                                                    <option value="Punjab National Bank">Punjab National Bank</option>
                                                    <option value="Kotak Mahindra Bank">Kotak Mahindra Bank</option>
                                                </select>
                                            </div>
                                            <p className="text-[10px] text-gray-400">You will be securely redirected to your bank account dashboard to authorize this transaction.</p>
                                        </div>
                                    )}

                                    {/* Security Shield Warnings & Network Verifier */}
                                    <div className="bg-blue-50 border border-blue-200 rounded-xl p-3 flex items-center gap-2.5 text-[11px] text-blue-800">
                                        <Icon name="ShieldCheck" className="h-4 w-4 text-blue-600 flex-shrink-0" />
                                        <span>Protected by 256-bit SSL banking-grade encryption protocol.</span>
                                    </div>

                                    <button
                                        type="submit"
                                        disabled={isVerifyingUpi}
                                        className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 px-4 rounded-xl text-xs transition shadow-md flex items-center justify-center gap-1.5 disabled:opacity-50 disabled:cursor-not-allowed"
                                    >
                                        {isVerifyingUpi ? (
                                            <>
                                                <div className="animate-spin rounded-full h-4 w-4 border-2 border-white border-t-transparent"></div>
                                                <span>Verifying Transaction Ledger...</span>
                                            </>
                                        ) : (
                                            <>
                                                <Icon name="ShieldCheck" className="h-5 w-5" />
                                                <span>Confirm Payment of ₹{cartGrandTotal.toLocaleString('en-IN', { maximumFractionDigits: 2 })}</span>
                                            </>
                                        )}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Tax Invoice Presentation Overlay */}
                    {viewingInvoiceOrder && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 overflow-y-auto">
                            <div className="bg-white rounded-2xl max-w-2xl w-full p-6 sm:p-8 relative shadow-2xl border border-gray-100 my-8">
                                <button 
                                    onClick={() => setViewingInvoiceOrder(null)}
                                    className="absolute top-4 right-4 p-2 text-gray-400 hover:text-gray-600 rounded-full hover:bg-gray-100 transition no-print"
                                >
                                    <Icon name="X" className="h-5 w-5" />
                                </button>

                                <div id="tax-invoice-printable" className="space-y-6">
                                    <div className="flex justify-between items-start border-b border-gray-200 pb-4">
                                        <div>
                                            <h1 className="text-xl font-black text-indigo-700">SHOPIFY-LITE INDIA</h1>
                                            <p className="text-[10px] text-gray-400 mt-1">GSTIN Number: 07AAACS4321A1Z2</p>
                                            <p className="text-[10px] text-gray-400">Tax Invoice / Bill of Supply</p>
                                        </div>
                                        <div className="text-right">
                                            <h2 className="text-sm font-bold text-gray-900">TAX INVOICE</h2>
                                            <p className="text-[10px] text-gray-500 font-bold mt-1">Invoice No: INV-{viewingInvoiceOrder.id.replace('ORD-', '')}</p>
                                            <p className="text-[10px] text-gray-500">Date: {viewingInvoiceOrder.date}</p>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-6 text-xs border-b border-gray-200 pb-4">
                                        <div>
                                            <h3 className="font-extrabold text-gray-400 uppercase text-[9px] mb-1">Sold By (Merchant)</h3>
                                            <strong className="text-gray-900 block font-bold">SHOPIFY-LITE MARKETPLACE</strong>
                                            <span className="text-gray-500 block leading-tight font-semibold text-gray-700">RWH - Mail Hub Plot No-23, Tower-2 Ground floor Navi Mumbai -400703</span>
                                        </div>
                                        <div>
                                            <h3 className="font-extrabold text-gray-400 uppercase text-[9px] mb-1">Billing To (Buyer)</h3>
                                            <strong className="text-gray-900 block font-bold">{viewingInvoiceOrder.customerName}</strong>
                                            <span className="text-gray-500 block">Phone: {viewingInvoiceOrder.customerPhone}</span>
                                            <span className="text-gray-500 block">Email: {viewingInvoiceOrder.customerEmail}</span>
                                            <span className="text-gray-500 block leading-tight">{viewingInvoiceOrder.shippingAddress}</span>
                                        </div>
                                    </div>

                                    <div>
                                        <table className="w-full text-xs text-left border-collapse">
                                            <thead>
                                                <tr className="bg-gray-50 border-b border-gray-200 text-gray-500 font-extrabold text-[9px] uppercase tracking-wider">
                                                    <th className="p-2">Product Description</th>
                                                    <th className="p-2 text-right">Unit Price</th>
                                                    <th className="p-2 text-center">Qty</th>
                                                    <th className="p-2 text-right">Taxable Value</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-100 text-gray-700">
                                                {viewingInvoiceOrder.items.map((it, idx) => (
                                                    <tr key={idx}>
                                                        <td className="p-2 font-semibold text-gray-900">{it.title}</td>
                                                        <td className="p-2 text-right">₹{(it.price / 1.18).toLocaleString('en-IN', { maximumFractionDigits: 2 })}</td>
                                                        <td className="p-2 text-center">{it.quantity}</td>
                                                        <td className="p-2 text-right">₹{((it.price / 1.18) * it.quantity).toLocaleString('en-IN', { maximumFractionDigits: 2 })}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>

                                    <div className="flex justify-end pt-4 border-t border-gray-200">
                                        <div className="w-64 text-xs space-y-1.5 text-gray-600">
                                            <div className="flex justify-between">
                                                <span>Taxable Subtotal (Excl. Tax)</span>
                                                <span className="font-medium text-gray-900">₹{(viewingInvoiceOrder.total - viewingInvoiceOrder.gstAmount).toLocaleString('en-IN', { maximumFractionDigits: 2 })}</span>
                                            </div>
                                            <div className="flex justify-between font-medium text-indigo-700">
                                                <span>GST Component Collected (18%)</span>
                                                <span>+ ₹{viewingInvoiceOrder.gstAmount.toLocaleString('en-IN', { maximumFractionDigits: 2 })}</span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span>Shipping Charges</span>
                                                <span className="text-emerald-600 font-bold">FREE</span>
                                            </div>
                                            <div className="flex justify-between border-t border-gray-200 pt-1.5 font-bold text-gray-900 text-sm">
                                                <span>Grand Total (Incl. Tax)</span>
                                                <span className="text-indigo-700 font-black">₹{viewingInvoiceOrder.total.toLocaleString('en-IN', { maximumFractionDigits: 2 })}</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-gray-50 rounded-xl p-4 border border-gray-200/60 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 text-xs">
                                        <div>
                                            <h4 className="font-bold text-gray-900 uppercase">Payment Summary Acknowledgement</h4>
                                            <p className="text-gray-500 mt-0.5">Mode of Payment: <strong>{viewingInvoiceOrder.paymentMethod}</strong></p>
                                            <p className="text-gray-500">Transaction Ref Number: <strong>{viewingInvoiceOrder.transactionId}</strong></p>
                                        </div>
                                        <div className="text-center bg-white border border-gray-200 p-2 rounded-lg font-bold">
                                            <span className="text-emerald-600 block">PAID IN FULL</span>
                                            <span className="text-gray-400 text-[8px]">SHOPIFY-LITE INVOICE</span>
                                        </div>
                                    </div>

                                    <p className="text-[9px] text-gray-400 text-center leading-relaxed">
                                        This is an official computer-generated tax invoice and does not require a physical signature. Returns and exchange parameters are governed under our digital vendor agreements.
                                    </p>
                                </div>

                                <div className="mt-6 pt-4 border-t border-gray-100 flex justify-end no-print">
                                    <button
                                        onClick={() => window.print()}
                                        className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-xl text-xs transition flex items-center gap-1.5"
                                    >
                                        <Icon name="Download" className="h-4 w-4" /> Print / Save Tax Invoice
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Unified Customer/Merchant Login Popups */}
                    {showAuthModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 no-print">
                            <div className="bg-white rounded-3xl max-w-md w-full p-6 sm:p-8 relative shadow-2xl border border-gray-100">
                                <button 
                                    onClick={() => setShowAuthModal(false)}
                                    className="absolute top-4 right-4 p-2 text-gray-400 hover:text-gray-600 rounded-full hover:bg-gray-100 transition"
                                >
                                    <Icon name="X" className="h-5 w-5" />
                                </button>

                                <div className="text-center mb-6">
                                    <h2 className="text-2xl font-black text-gray-900">Sign In Securely</h2>
                                    <p className="text-xs text-gray-500 mt-1">Access buy and sell dashboards instantly</p>
                                </div>

                                <div className="grid grid-cols-2 gap-2 bg-gray-100 p-1 rounded-xl mb-6">
                                    <button
                                        type="button"
                                        onClick={() => { setAuthRole('customer'); }}
                                        className={`py-2 text-xs font-bold rounded-lg transition ${
                                            authRole === 'customer' 
                                                ? 'bg-white text-indigo-600 shadow-sm' 
                                                : 'text-gray-500 hover:text-gray-900'
                                        }`}
                                    >
                                        Buy (Customer Panel)
                                    </button>
                                    <button
                                        type="button"
                                        onClick={() => { setAuthRole('seller'); }}
                                        className={`py-2 text-xs font-bold rounded-lg transition ${
                                            authRole === 'seller' 
                                                ? 'bg-white text-indigo-600 shadow-sm' 
                                                : 'text-gray-500 hover:text-gray-900'
                                        }`}
                                    >
                                        Sell (Merchant Panel)
                                    </button>
                                </div>

                                <form onSubmit={handleAuthSubmit} className="space-y-4">
                                    {authRole === 'customer' && (
                                        <>
                                            <div>
                                                <label className="block text-[10px] font-extrabold text-gray-400 uppercase mb-1 tracking-wider">Mobile Phone Number</label>
                                                <div className="relative">
                                                    <Icon name="Phone" className="absolute left-3 top-3 h-4 w-4 text-gray-400" />
                                                    <input
                                                        type="tel"
                                                        required
                                                        placeholder="e.g. 9876543210"
                                                        value={customerPhone}
                                                        onChange={(e) => setCustomerPhone(e.target.value)}
                                                        className="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-xl text-xs focus:ring-1 focus:ring-indigo-500 bg-white"
                                                    />
                                                </div>
                                            </div>

                                            <div>
                                                <label className="block text-[10px] font-extrabold text-gray-400 uppercase mb-1 tracking-wider">Password</label>
                                                <div className="relative">
                                                    <Icon name="Lock" className="absolute left-3 top-3 h-4 w-4 text-gray-400" />
                                                    <input
                                                        type="password"
                                                        required
                                                        placeholder="••••••••"
                                                        value={customerPassword}
                                                        onChange={(e) => setCustomerPassword(e.target.value)}
                                                        className="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-xl text-xs focus:ring-1 focus:ring-indigo-500 bg-white"
                                                    />
                                                </div>
                                            </div>
                                        </>
                                    )}

                                    {authRole === 'seller' && (
                                        <>
                                            <div>
                                                <label className="block text-[10px] font-extrabold text-gray-400 uppercase mb-1 tracking-wider">Email Address</label>
                                                <div className="relative">
                                                    <Icon name="Mail" className="absolute left-3 top-3 h-4 w-4 text-gray-400" />
                                                    <input
                                                        type="email"
                                                        required
                                                        placeholder="merchant@shopify-lite.in"
                                                        value={sellerEmail}
                                                        onChange={(e) => setSellerEmail(e.target.value)}
                                                        className="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-xl text-xs focus:ring-1 focus:ring-indigo-500 bg-white"
                                                    />
                                                </div>
                                            </div>

                                            <div>
                                                <label className="block text-[10px] font-extrabold text-gray-400 uppercase mb-1 tracking-wider">Account Password</label>
                                                <div className="relative">
                                                    <Icon name="Lock" className="absolute left-3 top-3 h-4 w-4 text-gray-400" />
                                                    <input
                                                        type="password"
                                                        required
                                                        placeholder="••••••••"
                                                        value={sellerPassword}
                                                        onChange={(e) => setSellerPassword(e.target.value)}
                                                        className="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-xl text-xs focus:ring-1 focus:ring-indigo-500 bg-white"
                                                    />
                                                </div>
                                            </div>
                                        </>
                                    )}

                                    <div className="pt-2">
                                        <button
                                            type="submit"
                                            className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl text-xs shadow-md hover:shadow-lg transition flex items-center justify-center gap-1.5"
                                        >
                                            <Icon name="Lock" className="h-4 w-4" /> Sign In securely to Shopify.Lite
                                        </button>
                                    </div>
                                </form>

                                <div className="text-center mt-4">
                                    <p className="text-[10px] text-gray-400 leading-relaxed">
                                        Credential validations are safely processed under an automated, encrypted session environment.
                                    </p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Floating Smart AI Chat Widget */}
                    <div className="fixed bottom-6 right-6 z-40 no-print">
                        {!showAiAssistant ? (
                            <button
                                onClick={() => setShowAiAssistant(true)}
                                className="bg-indigo-600 hover:bg-indigo-700 text-white p-4 rounded-full shadow-2xl flex items-center gap-2 hover:scale-105 transition animate-in fade-in zoom-in duration-200"
                                title="Ask AI Assistant"
                            >
                                <Icon name="Sparkles" className="h-6 w-6 animate-pulse" />
                                <span className="text-xs font-bold pr-1">Shop AI</span>
                            </button>
                        ) : (
                            <div className="bg-white border border-gray-200 rounded-3xl shadow-2xl w-80 sm:w-96 flex flex-col overflow-hidden h-[420px] animate-in slide-in-from-bottom-5 duration-200">
                                <div className="bg-indigo-600 p-4 text-white flex items-center justify-between">
                                    <div className="flex items-center gap-2">
                                        <Icon name="Sparkles" className="h-5 w-5 text-indigo-100" />
                                        <div>
                                            <h4 className="font-extrabold text-xs">AI Shop Assistant</h4>
                                            <p className="text-[10px] text-indigo-200">Powered by Shopify-Lite Smart Engine</p>
                                        </div>
                                    </div>
                                    <button 
                                        onClick={() => setShowAiAssistant(false)}
                                        className="text-indigo-200 hover:text-white p-1"
                                    >
                                        <Icon name="X" className="h-5 w-5" />
                                    </button>
                                </div>

                                <div className="flex-1 p-4 overflow-y-auto space-y-3 bg-gray-50">
                                    {chatMessages.map((msg, index) => (
                                        <div key={index} className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`p-3 rounded-2xl max-w-[85%] text-[11px] leading-relaxed whitespace-pre-line ${
                                                msg.sender === 'user' 
                                                    ? 'bg-indigo-600 text-white rounded-br-none' 
                                                    : 'bg-white border border-gray-200 text-gray-700 rounded-bl-none shadow-xs'
                                            }`}>
                                                {msg.text}
                                            </div>
                                        </div>
                                    ))}
                                    {isAiTyping && (
                                        <div className="flex justify-start">
                                            <div className="bg-white border border-gray-200 p-3 rounded-2xl rounded-bl-none text-[11px] text-gray-500 italic">
                                                AI is scanning listings...
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <form onSubmit={handleAiSendMessage} className="p-3 border-t border-gray-100 flex gap-2 bg-white">
                                    <input
                                        type="text"
                                        placeholder="e.g. Show beauty sale items..."
                                        value={userChatInput}
                                        onChange={(e) => setUserChatInput(e.target.value)}
                                        className="flex-1 px-3 py-2 border border-gray-200 rounded-xl text-[11px] focus:outline-none focus:ring-1 focus:ring-indigo-500"
                                    />
                                    <button 
                                        type="submit"
                                        className="bg-indigo-600 text-white p-2 rounded-xl hover:bg-indigo-700 transition"
                                    >
                                        <Icon name="ArrowRight" className="h-4 w-4" />
                                    </button>
                                </form>
                            </div>
                        )}
                    </div>

                    {/* Platform Footer */}
                    <footer className="bg-white border-t border-gray-200 py-8 mt-auto no-print">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row items-center justify-between gap-4 text-center text-xs text-gray-400">
                            <div className="flex items-center gap-2 justify-center">
                                <div className="bg-gray-100 p-1.5 rounded text-gray-500">
                                    <Icon name="ShoppingBag" className="h-4 w-4" />
                                </div>
                                <span>© 2026 Shopify.Lite India. RWH - Mail Hub Plot No-23, Tower-2 Ground floor Navi Mumbai -400703. All tax invoicing calculations comply with standard CGST / SGST regulations.</span>
                            </div>
                            <div className="flex gap-4 justify-center">
                                <span className="hover:text-indigo-600 cursor-pointer">Security Center</span>
                                <span className="hover:text-indigo-600 cursor-pointer">Merchant Terms</span>
                                <span className="hover:text-indigo-600 cursor-pointer">GST Helplines</span>
                            </div>
                        </div>
                    </footer>

                </div>
            );
        }

        // Render the fully configured application onto root
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
